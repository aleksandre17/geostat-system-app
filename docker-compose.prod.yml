# Production — `docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d`
services:
  geostat-system-app:
    build:
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL}
    ports:
      - "${HOST_PORT:-5175}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s